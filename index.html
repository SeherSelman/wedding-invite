<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Selman & Seher Wedding</title>

  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    body { margin:0; font-family: Arial, sans-serif; background:#f9f9f9; overflow-x:hidden; }
    section { padding:60px 20px; text-align:center; }

    .hero {
      height:100vh; display:flex; flex-direction:column; justify-content:center; align-items:center;
      background:linear-gradient(to bottom,#00000088,#00000088), url('https://via.placeholder.com/800x1200?text=Main+Photo');
      background-size:cover; color:white;
    }

    h1 { font-size:2.3rem; margin:0; }

    /* ENTRY SCREEN */
    #entryScreen {
      position:fixed; top:0; left:0; width:100%; height:100%;
      background:#f5efe6; display:flex; flex-direction:column;
      justify-content:center; align-items:center; z-index:9999;
    }

    #envelopeContainer {
      position:relative;
      width:250px;
    }

    #envelope {
      width:100%;
    }

    #seal {
      position:absolute;
      width:80px;
      left:50%;
      top:45%;
      transform:translate(-50%, -50%);
    }

    .shake {
      animation: shake 0.4s;
    }

    @keyframes shake {
      0% { transform: translate(-50%, -50%) rotate(0deg); }
      25% { transform: translate(-50%, -50%) rotate(3deg); }
      50% { transform: translate(-50%, -50%) rotate(-3deg); }
      75% { transform: translate(-50%, -50%) rotate(2deg); }
      100% { transform: translate(-50%, -50%) rotate(0deg); }
    }

    .open {
      animation: openEnvelope 1s forwards;
    }

    @keyframes openEnvelope {
      0% { transform: translateY(0); opacity:1; }
      100% { transform: translateY(-120%); opacity:0; }
    }

    #countdown { font-size:1.5rem; margin-top:15px; }
  </style>
</head>
<body>

<!-- ENTRY SCREEN -->
<div id="entryScreen">
  <div id="envelopeContainer">
    <img id="envelope" src="images/envelope-closed.png" />
    <img id="seal" src="images/seal-1.png" />
  </div>
  <p>Tap to break the seal</p>
</div>

<!-- AUDIO -->
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<!-- HERO -->
<section class="hero">
  <h1 data-aos="fade-up">Selman & Seher</h1>
  <p data-aos="fade-up">May 17, 2026</p>
  <div id="countdown"></div>
</section>

<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
AOS.init();

const entry = document.getElementById('entryScreen');
const envelope = document.getElementById('envelope');
const seal = document.getElementById('seal');
const music = document.getElementById('bgMusic');

let tapCount = 0;

entry.addEventListener('click', () => {
  tapCount++;

  seal.classList.add('shake');
  setTimeout(() => seal.classList.remove('shake'), 400);

  // Change seal images
  if (tapCount === 2) {
    seal.src = "images/seal-2.png";
  }

  if (tapCount === 3) {
    seal.src = "images/seal-3.png";

    setTimeout(() => {
      envelope.src = "images/envelope-open.png";
      seal.style.display = "none";
      envelope.classList.add('open');

      music.play();

      setTimeout(() => {
        entry.style.display = 'none';
      }, 1000);
    }, 300);
  }
});

// COUNTDOWN
const targetDate = new Date("May 17, 2026 00:00:00").getTime();
const countdownEl = document.getElementById("countdown");

setInterval(() => {
  const now = new Date().getTime();
  const diff = targetDate - now;

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);
  const seconds = Math.floor((diff / 1000) % 60);

  countdownEl.innerHTML = `${days}d ${hours}h ${minutes}m ${seconds}s`;
}, 1000);
</script>

</body>
</html>
