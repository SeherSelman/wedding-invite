<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wedding Invite</title>

  <!-- AOS Animation Library -->
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      scroll-behavior: smooth;
      background: #f9f9f9;
    }

    section {
      padding: 60px 20px;
      text-align: center;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(to bottom, #00000088, #00000088), url('https://via.placeholder.com/800x1200?text=Main+Photo');
      background-size: cover;
      background-position: center;
      color: white;
    }

    h1 {
      font-size: 2.5rem;
      margin: 0;
    }

    h2 {
      margin-bottom: 20px;
    }

    p {
      max-width: 500px;
      margin: auto;
    }

    img {
      width: 100%;
      max-width: 400px;
      border-radius: 12px;
      margin: 20px 0;
    }

    .btn {
      display: inline-block;
      padding: 15px 25px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      margin-top: 20px;
    }

    @media (max-width: 600px) {
      h1 {
        font-size: 2rem;
      }
    }
  </style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <h1 data-aos="fade-up">Your Name & Partner Name</h1>
    <p data-aos="fade-up" data-aos-delay="200">We’re getting married</p>
    <p data-aos="fade-up" data-aos-delay="400">Wedding Date Here</p>
  </section>

  <!-- STORY -->
  <section>
    <h2 data-aos="fade-up">Our Story</h2>
    <p data-aos="fade-up">Write your story here...</p>
    <img src="https://via.placeholder.com/400x500?text=Pic+1" data-aos="fade-up">
    <img src="https://via.placeholder.com/400x500?text=Pic+2" data-aos="fade-up">
  </section>

  <!-- DETAILS -->
  <section>
    <h2 data-aos="fade-up">Wedding Details</h2>
    <p data-aos="fade-up">Location: Your Venue</p>
    <p data-aos="fade-up">Time: Your Time</p>
    <img src="https://via.placeholder.com/400x500?text=Pic+3" data-aos="fade-up">
  </section>

  <!-- GALLERY -->
  <section>
    <h2 data-aos="fade-up">Gallery</h2>
    <img src="https://via.placeholder.com/400x500?text=Pic+4" data-aos="fade-up">
    <img src="https://via.placeholder.com/400x500?text=Pic+5" data-aos="fade-up">
    <img src="https://via.placeholder.com/400x500?text=Pic+6" data-aos="fade-up">
  </section>

  <!-- RSVP -->
  <section>
    <h2 data-aos="fade-up">RSVP</h2>
    <p data-aos="fade-up">Please confirm your attendance using the link below</p>
    <a href="https://your-google-form-link-here" class="btn" target="_blank">RSVP Here</a>
  </section>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>

</body>
</html>
